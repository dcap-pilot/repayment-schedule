<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rule 78 HP Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        body {
            font-size: 80%;
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
        .schedule-table th,
        .schedule-table td {
            font-size: 0.75rem;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'inter': ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-white min-h-screen pb-20">
    <!-- Header -->
    <header class="border-b border-gray-100 sticky top-0 bg-white z-10">
        <div class="max-w-2xl mx-auto px-4 py-4">
            <div class="flex items-center gap-4">
                <a href="index.html" class="text-gray-400 hover:text-gray-600 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 19l-7-7 7-7"/>
                    </svg>
                </a>
                <h1 class="text-lg font-semibold text-gray-900 tracking-tight">Rule 78 Hire Purchase</h1>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-2xl mx-auto px-4 py-6">
        <!-- Input Section -->
        <div class="space-y-5">
            <div class="mb-6">
                <p class="text-sm text-gray-500">Enter loan details to generate repayment schedule</p>
            </div>

            <!-- Financing Amount -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Financing Amount</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm">RM</span>
                    <input 
                        type="text" 
                        id="financingAmount" 
                        placeholder="10,000"
                        inputmode="decimal"
                        class="w-full pl-12 pr-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-gray-400 focus:ring-1 focus:ring-gray-400 transition-all text-gray-900"
                    >
                </div>
            </div>

            <!-- Profit Rate -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Profit Rate (per annum)</label>
                <div class="relative">
                    <input 
                        type="text" 
                        id="interestRate" 
                        placeholder="10.00"
                        inputmode="decimal"
                        class="w-full pl-4 pr-12 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-gray-400 focus:ring-1 focus:ring-gray-400 transition-all text-gray-900"
                    >
                    <span class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm">%</span>
                </div>
            </div>

            <!-- Tenure -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Tenure</label>
                <div class="relative">
                    <input 
                        type="text" 
                        id="tenure" 
                        placeholder="48"
                        inputmode="numeric"
                        class="w-full pl-4 pr-20 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-gray-400 focus:ring-1 focus:ring-gray-400 transition-all text-gray-900"
                    >
                    <span class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm">months</span>
                </div>
            </div>

            <!-- Calculate Button -->
            <button 
                onclick="calculateSchedule()"
                class="w-full py-3 bg-gray-900 text-white rounded-xl font-medium hover:bg-gray-800 active:bg-black transition-all mt-6"
            >
                Generate Schedule
            </button>
        </div>

        <!-- Results Section (Hidden by default) -->
        <div id="resultsSection" class="hidden mt-8">
            <!-- Divider -->
            <div class="border-t border-gray-100 my-8"></div>

            <!-- Summary Cards -->
            <div class="mb-6">
                <h2 class="text-sm font-medium text-gray-500 uppercase tracking-wider mb-4">Summary</h2>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-6">
                <div class="border border-gray-100 rounded-xl p-4">
                    <p class="text-xs text-gray-500 mb-1">Total Profit</p>
                    <p class="text-lg font-semibold text-gray-900" id="totalProfit">-</p>
                </div>
                <div class="border border-gray-100 rounded-xl p-4">
                    <p class="text-xs text-gray-500 mb-1">Balance Original Payable</p>
                    <p class="text-lg font-semibold text-gray-900" id="balancePayable">-</p>
                </div>
                <div class="border border-gray-100 rounded-xl p-4">
                    <p class="text-xs text-gray-500 mb-1">Monthly Instalment</p>
                    <p class="text-lg font-semibold text-gray-900" id="monthlyInstalment">-</p>
                </div>
                <div class="border border-gray-100 rounded-xl p-4">
                    <p class="text-xs text-gray-500 mb-1">Final Instalment</p>
                    <p class="text-lg font-semibold text-gray-900" id="finalInstalment">-</p>
                </div>
            </div>

            <!-- Repayment Schedule Table -->
            <div class="mb-4">
                <h2 class="text-sm font-medium text-gray-500 uppercase tracking-wider mb-4">Repayment Schedule</h2>
            </div>

            <div class="border border-gray-100 rounded-xl overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full schedule-table">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-4 py-3 text-left font-medium text-gray-600">Month</th>
                                <th class="px-4 py-3 text-right font-medium text-gray-600">Instalment</th>
                                <th class="px-4 py-3 text-right font-medium text-gray-600">Principal R78</th>
                                <th class="px-4 py-3 text-right font-medium text-gray-600">Profit R78</th>
                                <th class="px-4 py-3 text-right font-medium text-gray-600">Balance</th>
                            </tr>
                        </thead>
                        <tbody id="scheduleBody" class="divide-y divide-gray-50">
                            <!-- Schedule rows will be inserted here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        function formatNumber(num, decimals = 2) {
            return num.toLocaleString('en-MY', {
                minimumFractionDigits: decimals,
                maximumFractionDigits: decimals
            });
        }

        function calculateSchedule() {
            // Get input values
            const financingAmount = parseFloat(document.getElementById('financingAmount').value) || 0;
            const interestRate = parseFloat(document.getElementById('interestRate').value) || 0;
            const tenure = parseInt(document.getElementById('tenure').value) || 0;

            // Validate inputs
            if (financingAmount <= 0 || interestRate <= 0 || tenure <= 0) {
                alert('Please enter valid values for all fields');
                return;
            }

            // Calculate values
            // i) Total Profit (raw) = Financing Amount × (Profit Rate ÷ 100) × (Tenure ÷ 12)
            // Requirement: round UP Total Profit to 0 decimal places before generating schedule
            const totalProfitRaw = financingAmount * (interestRate / 100) * (tenure / 12);
            const totalProfit = Math.ceil(totalProfitRaw);

            // ii) Balance Original Payable = Financing Amount + Total Profit (rounded)
            const balancePayable = financingAmount + totalProfit;

            // iii) Monthly Instalment Amount = ceil(Balance Original Payable ÷ Tenure)
            const monthlyInstalment = Math.ceil(balancePayable / tenure);

            // iv) Final Instalment = Balance Original Payable - (Monthly Instalment × (Tenure - 1))
            // With Total Profit rounded, this should typically be a whole number; keep ceil for safety.
            const finalInstalmentRaw = balancePayable - (monthlyInstalment * (tenure - 1));
            const finalInstalment = Math.ceil(finalInstalmentRaw);

            // Update summary display
            document.getElementById('totalProfit').textContent = 'RM ' + formatNumber(totalProfit);
            document.getElementById('balancePayable').textContent = 'RM ' + formatNumber(balancePayable);
            document.getElementById('monthlyInstalment').textContent = 'RM ' + formatNumber(monthlyInstalment);
            document.getElementById('finalInstalment').textContent = 'RM ' + formatNumber(finalInstalment);

            // Generate repayment schedule using Rule of 78
            generateSchedule(financingAmount, totalProfit, tenure, monthlyInstalment, finalInstalment, balancePayable);

            // Show results section
            document.getElementById('resultsSection').classList.remove('hidden');

            // Scroll to results
            document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function generateSchedule(principal, totalProfit, tenure, monthlyInstalment, finalInstalment, balancePayable) {
            const tbody = document.getElementById('scheduleBody');
            tbody.innerHTML = '';

            // Rule of 78: Sum of digits from 1 to tenure
            const sumOfDigits = (tenure * (tenure + 1)) / 2;

            let remainingBalance = balancePayable;
            let totalPrincipalPaid = 0;
            let totalProfitPaid = 0;

            for (let month = 1; month <= tenure; month++) {
                // Calculate profit portion using Rule of 78
                // Profit for month = (Remaining periods / Sum of digits) × Total Profit
                const remainingPeriods = tenure - month + 1;
                const profitPortionRaw = (remainingPeriods / sumOfDigits) * totalProfit;

                // Round profit to 0 decimals for each row, but ensure totals tally:
                // last month profit = remaining profit after prior rounding
                let profitPortion = Math.round(profitPortionRaw);
                if (month === tenure) {
                    profitPortion = Math.max(0, totalProfit - totalProfitPaid);
                }

                // Determine instalment for this month
                const instalment = (month === tenure) ? finalInstalment : monthlyInstalment;

                // Principal portion = Instalment - Rounded Profit
                const principalPortion = instalment - profitPortion;

                // Update remaining balance
                remainingBalance = remainingBalance - instalment;

                // Ensure last balance is exactly 0
                const displayBalance = (month === tenure) ? 0 : remainingBalance;

                totalPrincipalPaid += principalPortion;
                totalProfitPaid += profitPortion;

                // Create table row
                const row = document.createElement('tr');
                row.className = 'hover:bg-gray-50 transition-colors';
                row.innerHTML = `
                    <td class="px-4 py-3 text-gray-900">${month}</td>
                    <td class="px-4 py-3 text-right text-gray-900">${formatNumber(instalment)}</td>
                    <td class="px-4 py-3 text-right text-gray-600">${formatNumber(principalPortion)}</td>
                    <td class="px-4 py-3 text-right text-gray-600">${formatNumber(profitPortion)}</td>
                    <td class="px-4 py-3 text-right text-gray-900 font-medium">${formatNumber(Math.max(0, displayBalance))}</td>
                `;
                tbody.appendChild(row);
            }

            // Add totals row
            const totalsRow = document.createElement('tr');
            totalsRow.className = 'bg-gray-50 font-medium';
            totalsRow.innerHTML = `
                <td class="px-4 py-3 text-gray-900">Total</td>
                <td class="px-4 py-3 text-right text-gray-900">${formatNumber(balancePayable)}</td>
                <td class="px-4 py-3 text-right text-gray-900">${formatNumber(principal)}</td>
                <td class="px-4 py-3 text-right text-gray-900">${formatNumber(totalProfit)}</td>
                <td class="px-4 py-3 text-right text-gray-900">-</td>
            `;
            tbody.appendChild(totalsRow);
        }

        // Allow Enter key to trigger calculation
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                calculateSchedule();
            }
        });

        </script>
</body>
</html>
